<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image: url("background.png");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
}

.container{
    width:380px;
    padding:30px;
    border-radius:20px;
    background:white;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin-bottom:20px;
}

.search-box{
    display:flex;
    margin-bottom:20px;
}

.search-box input{
    flex:1;
    padding:10px;
    border-radius:10px 0 0 10px;
    border:1px solid #ddd;
    outline:none;
    font-size:16px;
}

.search-box button{
    padding:10px 15px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:0 10px 10px 0;
    cursor:pointer;
    font-size:16px;
}

.search-box button:hover{
    background:#00c6ff;
}

.weather{
    margin-top:15px;
}

.weather img{
    width:90px;
}
.weather-icon{
width:100px;
filter: brightness(0) saturate(100%) invert(42%) sepia(93%) saturate(400%) hue-rotate(180deg);
}

.temp{
    font-size:40px;
    font-weight:bold;
}

.details{
    margin-top:10px;
    text-align:left;
}

.details p{
    margin:5px 0;
}

.error{
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🌦 Weather App</h1>

    <div class="search-box">
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Search</button>
    </div>

    <div id="weatherResult"></div>
    <div class="error" id="error"></div>

</div>

<script>

const apiKey = "a65807d0170d410d89c51211260403";

async function getWeather(){

    const city = document.getElementById("city").value.trim();
    const result = document.getElementById("weatherResult");
    const error = document.getElementById("error");

    result.innerHTML = "";
    error.innerHTML = "";

    if(city === ""){
        error.innerHTML = "Please enter a city name!";
        return;
    }

    result.innerHTML = "Loading...";

    try{

        const response = await fetch(
        `https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${city}&aqi=no`
        );

        const data = await response.json();

        if(data.error){
            result.innerHTML="";
            error.innerHTML=data.error.message;
            return;
        }

        const location = data.location.name + ", " + data.location.country;
        const temp = data.current.temp_c;
        const condition = data.current.condition.text;
        const icon = data.current.condition.icon;
        const rain = data.current.precip_mm;
        const humidity = data.current.humidity;
        const cloud = data.current.cloud;
        const wind = data.current.wind_kph;

        result.innerHTML = `
<div class="weather">

<h2>${location}</h2>
<img src="./cloud.png" width="100">

<div class="temp">${temp}°C</div>

<p>${condition}</p>

<div class="details">

<p>🌧 Rain: ${rain} mm</p>

<p>💧 Humidity: ${humidity}%</p>

<p>☁ Cloud: ${cloud}%</p>

<p>🌬 Wind: ${wind} kph</p>

</div>

</div>
`;
    }
    

    catch(err){

        result.innerHTML="";
        error.innerHTML="Unable to fetch weather data.";

        console.log(err);

    }

}

document.getElementById("city").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        getWeather();
    }

});

</script>

</body>
</html>
